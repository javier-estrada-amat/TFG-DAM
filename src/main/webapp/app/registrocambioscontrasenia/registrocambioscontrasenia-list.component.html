<div class="flex flex-wrap items-center justify-between mb-6">
    <h1 class="text-3xl md:text-4xl font-semibold text-gray-800" i18n="@@registrocambioscontrasenia.list.headline">
        Registro de cambios de contraseña
    </h1>
</div>

@if (!registrocambioscontrasenias || registrocambioscontrasenias.length === 0) {
<div class="text-gray-600 italic" i18n="@@registrocambioscontrasenia.list.empty">
    No se encontraron registros de cambios de contraseña.
</div>
} @else {
<div class="overflow-x-auto rounded-lg shadow-md">
    <table class="min-w-full bg-white border border-gray-200">
        <thead class="bg-blue-600 text-white">
        <tr>
            <th class="text-left px-4 py-2" i18n="@@registrocambioscontrasenia.idRegistro.label">Id registro</th>
            <th class="text-left px-4 py-2" i18n="@@registrocambioscontrasenia.usuarioId.label">Id usuario</th>
            <th class="text-left px-4 py-2" i18n="@@registrocambioscontrasenia.fechaCambio.label">Fecha de cambio</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let registro of registrocambioscontrasenias; trackBy: trackById" class="odd:bg-gray-100 even:bg-white hover:bg-gray-50 transition-colors">
            <td class="px-4 py-2 font-medium text-gray-800">{{ registro.idRegistro }}</td>
            <td class="px-4 py-2 text-gray-700">{{ registro.usuarioId }}</td>
            <td class="px-4 py-2 text-gray-700">{{ registro.fechaCambio }}</td>
        </tr>
        </tbody>
    </table>
</div>
}
