<div class="flex flex-col items-center justify-center min-h-[50vh]">
    <h1 class="text-3xl md:text-4xl font-bold text-center mb-6">Control de Fichajes</h1>

    <p class="mb-4 text-gray-600">
        Estado actual:
        <span *ngIf="estado === 'INICIADO'" class="text-yellow-600 font-semibold">Fichaje en curso</span>
        <span *ngIf="estado === 'FINALIZADO'" class="text-green-600 font-semibold">Fichaje finalizado</span>
        <span *ngIf="!estado" class="text-gray-500 font-medium">Sin fichaje iniciado</span>
    </p>

    <div class="mt-4">
        <button
            *ngIf="!fichajeEnCurso"
            (click)="iniciarFichaje()"
            [disabled]="cargando"
            class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-md disabled:opacity-50"
        >
            Iniciar Fichaje
        </button>

        <button
            *ngIf="fichajeEnCurso"
            (click)="finalizarFichaje()"
            [disabled]="cargando"
            class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg shadow-md disabled:opacity-50"
        >
            Finalizar Fichaje
        </button>
    </div>
</div>
