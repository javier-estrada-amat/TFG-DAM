<div class="flex flex-wrap mb-6">
  <h1 class="grow text-3xl md:text-4xl font-medium mb-2" i18n="@@fichajes.list.headline">Fichajes</h1>
</div>

<div *ngIf="isLoading" class="text-center w-full my-4 text-blue-600 font-semibold">
  Cargando fichajes...
</div>

<div class="overflow-x-auto mt-4" *ngIf="!isLoading">
  <mat-table [dataSource]="dataSource" matSort class="min-w-full tablas">

    <!-- Usuario ID -->
    <ng-container matColumnDef="usuario_id">
      <mat-header-cell *matHeaderCellDef mat-sort-header> ID Usuario </mat-header-cell>
      <mat-cell *matCellDef="let fichaje"> {{ fichaje.usuario_id }} </mat-cell>
    </ng-container>

    <!-- Fecha -->
    <ng-container matColumnDef="fecha">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Fecha </mat-header-cell>
      <mat-cell *matCellDef="let fichaje"> {{ fichaje.fecha }} </mat-cell>
    </ng-container>

    <!-- Hora Entrada -->
    <ng-container matColumnDef="hora_entrada">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Hora Entrada </mat-header-cell>
      <mat-cell *matCellDef="let fichaje"> {{ fichaje.hora_entrada }} </mat-cell>
    </ng-container>

    <!-- Hora Salida -->
    <ng-container matColumnDef="hora_salida">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Hora Salida </mat-header-cell>
      <mat-cell *matCellDef="let fichaje"> {{ fichaje.hora_salida }} </mat-cell>
    </ng-container>

    <!-- Estado -->
    <ng-container matColumnDef="estado">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Estado </mat-header-cell>
      <mat-cell *matCellDef="let fichaje"> {{ fichaje.estado }} </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>

  <app-pagination></app-pagination>
</div>
