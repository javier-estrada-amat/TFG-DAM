<div class="container mt-4 mx-auto px-4 md:px-6">
<div class="flex flex-wrap mb-6">
    <h1 class="grow text-3xl md:text-4xl font-medium mb-2" i18n="@@empresas.edit.headline">Editar Empresas</h1>
    <div>
        <a routerLink="/empresas" class="inline-block text-white bg-gray-500 hover:bg-gray-600 focus:ring-gray-200 focus:ring-4 rounded px-5 py-2" i18n="@@empresas.edit.back">Lista de empresas</a>
    </div>
</div>
<form [formGroup]="editForm" (ngSubmit)="handleSubmit()">
    <app-input-row [group]="editForm" field="id_empresa" rowType="number" i18n-label="@@empresas.idempresa.label" label="Idempresa" />
    <app-input-row [group]="editForm" field="nombre" i18n-label="@@empresas.nombre.label" label="Nombre" />
    <app-input-row [group]="editForm" field="cif" i18n-label="@@empresas.cif.label" label="CIF" />
    <app-input-row [group]="editForm" field="direccion" i18n-label="@@empresas.direccion.label" label="Direccion" />
    <app-input-row [group]="editForm" field="telefono" i18n-label="@@empresas.telefono.label" label="Telefono" />
    <app-input-row [group]="editForm" field="email" i18n-label="@@empresas.email.label" label="Email" />
    <input type="submit" i18n-value="@@empresas.edit.headline" value="Aplicar cambios" class="inline-block text-white bg-blue-600 hover:bg-blue-700 focus:ring-blue-300  focus:ring-4 rounded px-5 py-2 mt-6" />
</form>
</div>
