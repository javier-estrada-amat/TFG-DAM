<div class="flex flex-col items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-sm p-6 bg-white rounded shadow-md">
        <h2 class="mb-6 text-xl font-bold text-center">Iniciar sesión</h2>

        <form (ngSubmit)="login()">
            <div class="mb-4">
                <label class="block mb-1 font-semibold">Correo electrónico</label>
                <input [(ngModel)]="email" name="email" type="email" class="w-full px-3 py-2 border rounded" required>
            </div>

            <div class="mb-4">
                <label class="block mb-1 font-semibold">Contraseña</label>
                <input [(ngModel)]="password" name="password" type="password" class="w-full px-3 py-2 border rounded" required>
            </div>

            <button type="submit" class="w-full py-2 font-semibold text-white bg-blue-600 rounded hover:bg-blue-700">
                Entrar
            </button>

            <div *ngIf="error" class="mt-4 text-sm text-red-600">
                {{ error }}
            </div>
        </form>
    </div>
</div>
