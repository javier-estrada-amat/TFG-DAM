<div class="flex flex-col items-center justify-center min-h-screen h-screen bg-gradient-to-r from-blue-500 to-sky-600 overflow-hidden m-0">
    
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl transform transition-all hover:scale-105 duration-300">
        
        <div class="flex items-center justify-center mb-6">
            <h2 class="text-3xl text-center font-bold text-gray-800">Iniciar sesión</h2>
            <img ngSrc="logo.png" alt="SistemaFichajes" width="50" height="50"  />
        </div>

        <form (ngSubmit)="login()">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Correo electrónico</label>
                <input [(ngModel)]="email" name="email" type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                <input [(ngModel)]="password" name="password" type="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="********" required>
            </div>

            <button type="submit" class="w-full py-3 text-lg font-semibold text-white bg-blue-600 rounded-lg shadow-md hover:bg-blue-700 transition duration-300">Entrar</button>

            <div *ngIf="error" class="mt-4 text-center text-sm text-red-600">
                {{ error }}
            </div>
        </form>
    </div>
</div>
