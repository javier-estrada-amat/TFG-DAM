<div class="container mt-4 mx-auto px-4 md:px-6">
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-md p-8 bg-white shadow-lg rounded-2xl border border-gray-200">
        <h2 class="text-2xl font-semibold text-center mb-6 text-gray-800">Cambiar contraseña</h2>

        <form [formGroup]="form" (ngSubmit)="cambiarPassword()">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
                <input
                    type="password"
                    formControlName="nuevaPassword"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500
          transition duration-150 ease-in-out"
                    [ngClass]="{ 'border-red-500': error }"
                />
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Repetir contraseña</label>
                <input
                    type="password"
                    formControlName="repetirPassword"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500
          transition duration-150 ease-in-out"
                    [ngClass]="{ 'border-red-500': error }"
                />
            </div>

            <div *ngIf="error" class="text-red-500 text-sm mb-4">{{ error }}</div>
            <div *ngIf="success" class="text-green-600 text-sm mb-4">{{ success }}</div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
            >
                Cambiar contraseña
            </button>
        </form>
    </div>
</div>
</div>
