<header *ngIf="auth.isAuthenticated()" class="bg-gradient-to-r from-sky-200 to-blue-300 shadow-lg">
  <div class="container mx-auto flex items-center justify-between py-3 px-4">
    <a routerLink="/" class="flex items-center">
      <img ngSrc="logo.png" i18n-alt="@@app.title" alt="SistemaFichajes" width="35" height="35" class="inline-block" />
      <span class="text-2xl pl-3 font-bold text-black" i18n="@@app.title">SistemaFichajes</span>
    </a>

    <nav class="flex items-center space-x-6">
      <a routerLink="/home" class="bg-white text-blue-600 px-4 py-2 rounded-lg shadow-lg hover:bg-gray-100 hover:text-blue-700 transition duration-300 font-semibold">
        Inicio
      </a>

      <div class="relative" #dropdown (click)="toggleDropdown($event)">
        <button type="button" class="bg-white text-blue-600 px-4 py-2 rounded-lg shadow-lg flex items-center hover:bg-gray-100 hover:text-blue-700 transition duration-300 font-semibold">
          <span i18n="@@navigation.entities">Menú</span>
          <svg class="w-4 h-4 ml-1 transition-transform duration-300" [class.rotate-180]="openDropdown" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        <ul *ngIf="openDropdown" class="absolute right-0 bg-white rounded-lg shadow-lg py-2 mt-2 z-50 min-w-[12rem] border border-gray-200 transition duration-300">
          <li *ngIf="auth.hasAnyRole(['ADMIN', 'DIRECCION'])">
            <a routerLink="/usuarios" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Usuarios</a>
          </li>
          <li *ngIf="auth.hasRole('ADMIN')">
            <a routerLink="/roles" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Roles</a>
          </li>
          <li *ngIf="auth.hasRole('ADMIN')">
            <a routerLink="/empresas" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Empresas</a>
          </li>
          <li>
            <a routerLink="/fichajes/control" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Fichar</a>
          </li>
          <li>
            <a routerLink="/fichajes" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Historial de fichajes</a>
          </li>
          <li>
            <a routerLink="/horasextras/add" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Solicitar horas extras</a>
          </li>
          <li *ngIf="auth.hasAnyRole(['ADMIN', 'DIRECCION'])">
            <a routerLink="/horasextras/aprobar" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Aprobar horas extras</a>
          </li>
          <li>
            <a routerLink="/horasextras/historial" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Historial de horas extras</a>
          </li>
          <li *ngIf="auth.hasAnyRole(['ADMIN', 'DIRECCION'])">
            <a routerLink="/registrocambioscontrasenia" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Registro cambios contraseñas</a>
          </li>
          <li *ngIf="auth.hasAnyRole(['ADMIN', 'DIRECCION'])">
            <a routerLink="/historialactividad" class="block px-4 py-2 hover:bg-gray-100 transition duration-300">Historial actividad</a>
          </li>
        </ul>
          <div *ngIf="nombreCompleto" class="text-black font-medium ml-4 flex items-center gap-2">
              <span class="hidden sm:inline">👤 {{ nombreCompleto }}</span>
          </div>
      </div>

      <button (click)="logout()" class="bg-red-500 text-slate-100 px-4 py-2 rounded-lg shadow-lg hover:bg-red-100 hover:text-black transition duration-300 font-semibold">
        Cerrar sesión
      </button>
    </nav>
  </div>
</header>
