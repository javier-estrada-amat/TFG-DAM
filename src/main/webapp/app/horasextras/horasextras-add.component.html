<div class="container mt-4 mx-auto px-4 md:px-6">
<div class="max-w-xl mx-auto p-6 bg-white rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Solicitar Horas Extras</h2>

    <form (ngSubmit)="onSubmit()" #form="ngForm">
        <div class="mb-4">
            <label for="fecha" class="block font-semibold">Fecha</label>
            <input type="date" id="fecha" name="fecha" [(ngModel)]="horasextras.fecha" required class="w-full border p-2 rounded">
            <div *ngIf="!isFechaValida()" class="text-red-600 mt-1">
              La fecha no puede ser posterior a hoy.
            </div>
          </div>

        <div class="mb-4">
            <label for="horassolicitadas" class="block font-semibold">Horas solicitadas</label>
            <p class="text-sm text-gray-500">Formato: 0.5, 1, 1.5, ..., 99</p>
            <input
            type="number"
            step="0.5"
            min="0.5"
            max="99"
            id="horassolicitadas"
            name="horassolicitadas"
            pattern="^(?:[0-9]|[1-9][0-9])(?:\\.(0|5))?$"
            [(ngModel)]="horasextras.horasSolicitadas"
            #horasSolicitadasModel="ngModel"
            required
            class="w-full border p-2 rounded">

          
        </div>
      
          
          

        <div class="mb-4">
            <label for="motivo" class="block font-semibold">Motivo (opcional)</label>
            <textarea id="motivo" name="motivo" [(ngModel)]="horasextras.motivo" class="w-full border p-2 rounded"></textarea>
        </div>

        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
            [disabled]="form.invalid || !isFechaValida()">Enviar Solicitud</button>
    </form>
</div>
</div>
