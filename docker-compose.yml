version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql_container
    environment:
      - MYSQL_DATABASE=sistemaFichajes
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  spring-app:
    build: .
    container_name: spring_container
    restart: always
    environment:
      JDBC_DATABASE_URL: jdbc:mysql://mysql:3306/sistemaFichajes?serverTimezone=UTC
      JDBC_DATABASE_USERNAME: root
      JDBC_DATABASE_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
