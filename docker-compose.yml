version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql_container
    environment:
      - MYSQL_DATABASE=sistema_fichajes
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
