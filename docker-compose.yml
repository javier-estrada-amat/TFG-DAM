version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql_container
    environment:
      - MYSQL_DATABASE=sistema_fichajes
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  spring-app:
    image: eclipse-temurin:17-jdk-alpine
    container_name: spring_container
    restart: always
    environment:
      JDBC_DATABASE_URL: jdbc:mysql://mysql:3306/sistema_fichajes?serverTimezone=UTC
      JDBC_DATABASE_USERNAME: root
      JDBC_DATABASE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./target:/app
    working_dir: /app
    command: ["java", "-jar", "tu-app.jar"]
